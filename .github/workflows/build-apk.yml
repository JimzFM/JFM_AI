name: Build Android APK (Bubblewrap)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Signing Key
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android_password' }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_B64" ]; then
            echo "Decoding signing key from secrets..."
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > ./android.keystore
          else
            echo "ANDROID_KEYSTORE secret is required for a reproducible, updateable APK." >&2
            exit 1
          fi

      - name: Build TWA and APK via Bubblewrap Docker
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android_password' }}
        run: |
          # Pin Bubblewrap to keep APK builds reproducible.
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            --env KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            --entrypoint /bin/bash \
            ghcr.io/googlechromelabs/bubblewrap:1.22.2 \
            -c "echo 'y' | bubblewrap update --skip-pwa-validation --skipVersionUpgrade && bubblewrap build --skip-pwa-validation --storepass \$KEYSTORE_PASSWORD --keypass \$KEYSTORE_PASSWORD"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jfm-ai-release-apk
          path: ./*.apk
