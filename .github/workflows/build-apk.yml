name: Build Android APK (Bubblewrap)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap Paths
        run: |
          # Use the official updateConfig command to set paths and validate them
          bubblewrap updateConfig --jdkPath "$JAVA_HOME" --androidSdkPath "$ANDROID_HOME"

      - name: Prepare Signing Key
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android_password' }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_B64" ]; then
            echo "Decoding signing key from secrets..."
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > ./android.keystore
          else
            echo "No signing key found in secrets. Generating a temporary key..."
            keytool -genkeypair -v -keystore ./android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEYSTORE_PASSWORD" \
              -dname "CN=JFM, OU=JFM, O=JFM, L=City, S=State, C=US"
            
            echo "=========================================================================="
            echo "   ACTION REQUIRED: SAVE THIS KEYSTORE TO YOUR GITHUB SECRETS"
            echo "=========================================================================="
            echo "To keep signing your app with the same key (required for updates), copy the"
            echo "Base64 block below and save it as a Secret named ANDROID_KEYSTORE."
            echo "Also save the password as a Secret named KEYSTORE_PASSWORD (default is 'android_password')."
            echo ""
            echo "=== START BASE64 ENCODED KEYSTORE ==="
            base64 -w0 ./android.keystore
            echo ""
            echo "=== END BASE64 ENCODED KEYSTORE ==="
            echo "=========================================================================="
          fi

      - name: Display SHA-256 Fingerprint for assetlinks.json
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android_password' }}
        run: |
          echo "=========================================================================="
          echo "   SHA-256 FINGERPRINT FOR assetlinks.json"
          echo "=========================================================================="
          keytool -list -v -keystore ./android.keystore -alias android -storepass "$KEYSTORE_PASSWORD" | grep -i sha256
          echo "=========================================================================="

      - name: Update TWA Project
        run: |
          # Run update command to generate Android project and checksum non-interactively
          bubblewrap update --skip-pwa-validation

      - name: Build TWA / APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android_password' }}
        run: |
          # Build TWA non-interactively without piping "yes"
          bubblewrap build --skip-pwa-validation --storepass "$KEYSTORE_PASSWORD" --keypass "$KEYSTORE_PASSWORD"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jfm-ai-release-apk
          path: ./*.apk
